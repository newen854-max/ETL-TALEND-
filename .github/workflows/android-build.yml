name: Build Mobile ETL APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Install Gradle directly on the VM
      - name: Install System Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      # Find project location and generate standard wrapper
      - name: Auto-Generate Gradle Wrapper
        run: |
          SETTINGS_PATH=$(find . -name "settings.gradle" -print -quit)
          if [ -z "$SETTINGS_PATH" ]; then
            echo "Error: Could not find settings.gradle in repository!"
            exit 1
          fi
          PROJECT_DIR=$(dirname "$SETTINGS_PATH")
          echo "Project directory found: $PROJECT_DIR"
          
          cd "$PROJECT_DIR"
          gradle wrapper --gradle-version 8.2
          chmod +x ./gradlew

      # Build using a wild-card search execution to compile
      - name: Build Debug APK
        run: |
          GRADLEW_EXEC=$(find . -name "gradlew" -print -quit)
          GRADLEW_DIR=$(dirname "$GRADLEW_EXEC")
          cd "$GRADLEW_DIR"
          ./gradlew assembleDebug

      # Upload any app-debug.apk output file found anywhere in your repository
      - name: Upload Compiled APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-ETL-Engine
          path: "**/build/outputs/apk/debug/app-debug.apk"
